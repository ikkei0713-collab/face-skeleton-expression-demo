<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="顔骨格" />
  <meta name="theme-color" content="#0b0f1a" />
  <title>顔骨格 × 表情判定デモ</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <h1>顔骨格 × 表情判定</h1>
      <span id="status" class="status">モデル読み込み中…</span>
    </header>

    <div id="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>

      <div id="startScreen" class="overlay-screen">
        <button id="startBtn" disabled>カメラを起動</button>
        <p class="hint">iPhone の Safari で開いてください。<br />カメラの許可を求められたら「許可」を選択。</p>
      </div>
    </div>

    <div id="panel">
      <div id="expression">
        <div class="emoji" id="emoji">🙂</div>
        <div class="label" id="exprLabel">表情を判定中…</div>
      </div>
      <div id="bars"></div>
      <div id="controls">
        <label class="toggle"><input type="checkbox" id="toggleMesh" checked /> メッシュ</label>
        <label class="toggle"><input type="checkbox" id="toggleContours" checked /> 輪郭・目・口</label>
        <label class="toggle"><input type="checkbox" id="togglePoints" /> 全点表示</label>
        <label class="toggle"><input type="checkbox" id="toggleMirror" checked /> 左右反転</label>
      </div>
      <div id="fps" class="fps"></div>
    </div>
  </div>

  <!-- 監視スクリプト（非module: モジュール読込が失敗しても必ず動く）-->
  <script>
    (function () {
      var statusEl = document.getElementById("status");
      var hintEl = document.querySelector("#startScreen .hint");
      function showError(msg) {
        if (statusEl) { statusEl.textContent = "エラー"; statusEl.className = "status error"; }
        if (hintEl) { hintEl.textContent = "エラー: " + msg; }
      }
      // 実行時エラーを画面に出す
      window.addEventListener("error", function (e) {
        showError((e && e.message ? e.message : "不明なエラー"));
      });
      window.addEventListener("unhandledrejection", function (e) {
        var r = e && e.reason;
        showError((r && r.message ? r.message : String(r)));
      });
      // ウォッチドッグ: 一定時間内に準備完了もエラーも出なければ通知
      var WATCH_MS = 20000;
      setTimeout(function () {
        if (window.__APP_READY || window.__APP_ERROR) return;
        if (!window.__APP_MODULE_LOADED) {
          showError("スクリプトを読み込めませんでした。通信環境を変えて再読み込みしてください。");
        } else if (statusEl && /読み込み中|取得中|WASM/.test(statusEl.textContent)) {
          if (hintEl) hintEl.textContent = "読み込みに時間がかかっています…（初回は数MBのモデル取得があります）電波の良い場所で再読み込みしてください。";
        }
      }, WATCH_MS);
    })();
  </script>
  <script type="module" src="./app.js"></script>
</body>
</html>
